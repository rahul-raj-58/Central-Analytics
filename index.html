<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Delivery Dashboard - Live Data</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
body{margin:0;background:#F6F6F9;color:#1C2230;font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
.wrap{max-width:720px;margin:0 auto;padding:24px 16px 40px;}
.header{background:linear-gradient(135deg,#6C4BD9,#5538C9);border-radius:16px;padding:22px 24px;position:relative;text-align:center;box-shadow:0 8px 24px rgba(85,56,201,.22);}
.htitle{font-size:21px;font-weight:700;color:#fff;letter-spacing:-.3px;}
.hsub{font-size:13px;color:#E5DEFA;margin-top:5px;}
.htime{position:absolute;top:14px;right:18px;font-size:11px;color:#CFC4F5;}
.loading{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;}
.loading-spinner{background:white;border-radius:12px;padding:30px;text-align:center;}
.spinner{width:40px;height:40px;border:3px solid #E5E7EB;border-top-color:#6C4BD9;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 15px;}
@keyframes spin{to{transform:rotate(360deg)}}
.verdict{display:flex;gap:11px;align-items:flex-start;background:#FCEBEB;border-left:4px solid #D23B3A;border-radius:12px;padding:13px 15px;margin:18px 0 4px;}
.verdict .vi{color:#D23B3A;flex:none;margin-top:1px;}
.verdict .vt{font-size:14px;color:#D23B3A;line-height:1.5;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
@media(max-width:600px){.grid{grid-template-columns:1fr;}}
.card{background:#FFFFFF;border:1px solid #ECECF1;border-radius:16px;padding:16px;box-shadow:0 1px 2px rgba(20,25,40,.04),0 6px 18px rgba(20,25,40,.03);}
.card-top{display:flex;align-items:center;justify-content:space-between;}
.card-id{display:flex;align-items:center;gap:10px;}
.pname{font-size:14px;font-weight:700;color:#1C2230;}
.psub{font-size:11px;color:#9AA0AD;margin-top:1px;}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
.metric{display:flex;align-items:baseline;gap:8px;margin:12px 0 2px;}
.big{font-size:30px;font-weight:800;letter-spacing:-1px;line-height:1;}
.munit{font-size:11px;color:#646B7A;font-weight:600;}
.ptcard{padding:14px 16px;}
.ptl{color:#9AA0AD;font-weight:600;}
.foot{margin-top:22px;padding-top:14px;border-top:1px solid #ECECF1;font-size:11px;color:#9AA0AD;line-height:1.6;}
.error-msg{background:#FEE2E2;border:1px solid #FECACA;color:#DC2626;padding:12px 16px;border-radius:8px;margin:16px 0;}
.refresh-btn{background:#6C4BD9;color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:600;font-size:12px;position:absolute;top:14px;left:18px;}
.refresh-btn:hover{background:#5538C9;}
</style></head>
<body>
<div class="wrap">
  <div class="header">
    <button class="refresh-btn" onclick="loadDashboard()">↻ Refresh</button>
    <div class="htime" id="dateTime">Loading...</div>
    <div class="htitle">Delivery Dashboard</div>
    <div class="hsub">Images · 360 · Video</div>
  </div>

  <div id="errorContainer"></div>
  <div id="contentContainer" style="display:none;">
    <div id="verdict"></div>
    <div style="display:flex;align-items:center;gap:9px;margin:26px 0 12px;"><span style="width:4px;height:17px;border-radius:3px;background:#6C4BD9;"></span><span style="font-size:15px;font-weight:700;color:#1C2230;letter-spacing:-.1px;">SLA Breach · MTD</span></div>
    <div class="grid" id="slaGrid"></div>

    <div style="display:flex;align-items:center;gap:9px;margin:26px 0 12px;"><span style="width:4px;height:17px;border-radius:3px;background:#6C4BD9;"></span><span style="font-size:15px;font-weight:700;color:#1C2230;letter-spacing:-.1px;">Pendency · VINs > 6 hrs</span></div>
    <div class="grid" id="pendencyGrid"></div>

    <div style="display:flex;align-items:center;gap:9px;margin:26px 0 12px;"><span style="width:4px;height:17px;border-radius:3px;background:#6C4BD9;"></span><span style="font-size:15px;font-weight:700;color:#1C2230;letter-spacing:-.1px;">Delivery Time · P95 / P99 (hrs)</span></div>
    <div class="grid" id="p95Grid"></div>

    <div class="foot">Generated from Central Analytics. Data loaded: <span id="loadTime">—</span>. Updated automatically.</div>
  </div>

  <div id="loadingContainer" class="loading">
    <div class="loading-spinner">
      <div class="spinner"></div>
      <p style="margin:0;color:#1C2230;font-weight:600;">Loading Dashboard</p>
    </div>
  </div>
</div>

<script>
// Google Visualization API URL - Works with published sheets
const SHEET_ID = 'e/2PACX-1vRW-XqDlvrKPrmev5u9X44Pg_qQIu1fzDmCoszOUVAF98yW7esDACb6rUeI6oGybBnZrnFG5477UhzG';
const GID = '2034010422';
const VIZ_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=1&gid=${GID}`;

const COLORS = {
  Images: { icon: '#EEEAFB', brand: '#6C4BD9', metric: '#C07C12', dot: '#6C4BD9' },
  '360': { icon: '#E1F3EC', brand: '#12936A', metric: '#D23B3A', dot: '#12936A' },
  Video: { icon: '#E6F0FE', brand: '#2D7FF9', metric: '#D23B3A', dot: '#2D7FF9' }
};

const ICONS = {
  Images: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="9" r="1.6"/><path d="M21 16l-5-5L5 21"/></svg>',
  '360': '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><polyline points="21 3.5 21 8 16.5 8"/><ellipse cx="12" cy="13.5" rx="5.5" ry="2.4"/></svg>',
  Video: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2.5" y="6" width="13" height="12" rx="2.5"/><path d="M15.5 10l6-3.2v10.4l-6-3.2z"/></svg>'
};

let sheetData = {};

async function loadDashboard() {
  const loadingContainer = document.getElementById('loadingContainer');
  const contentContainer = document.getElementById('contentContainer');
  const errorContainer = document.getElementById('errorContainer');
  
  loadingContainer.style.display = 'flex';
  contentContainer.style.display = 'none';
  errorContainer.innerHTML = '';
  
  try {
    const startTime = performance.now();
    
    // Fetch from Google Visualization API
    const response = await fetch(VIZ_URL + '&t=' + Date.now());
    
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    
    const text = await response.text();
    const endTime = performance.now();
    
    // Parse Google Visualization response
    const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
    const json = JSON.parse(jsonString);
    
    sheetData = parseVisualizationData(json);
    
    // Update UI
    updateDateTime();
    buildDashboard();
    document.getElementById('loadTime').textContent = Math.round(endTime - startTime) + 'ms';
    
    contentContainer.style.display = 'block';
    loadingContainer.style.display = 'none';
    
  } catch (error) {
    console.error('Error loading dashboard:', error);
    loadingContainer.style.display = 'none';
    errorContainer.innerHTML = `<div class="error-msg"><b>Error loading data:</b> ${error.message}</div>`;
  }
}

function parseVisualizationData(json) {
  const data = {};
  
  if (!json.table || !json.table.rows) {
    throw new Error('Invalid sheet data format');
  }
  
  const cols = json.table.cols;
  const rows = json.table.rows;
  
  // Get headers from column labels
  const headers = cols.map(col => col.label);
  
  // Parse rows
  rows.forEach(row => {
    const cells = row.c.map(cell => cell ? cell.v : '');
    const product = cells[0];
    const metric = cells[1];
    
    if (!product || !metric) return;
    
    if (!data[product]) data[product] = {};
    
    data[product][metric] = {};
    headers.slice(2).forEach((header, i) => {
      const val = cells[i + 2];
      data[product][metric][header] = val ? (typeof val === 'number' ? val : parseFloat(val) || 0) : 0;
    });
  });
  
  return data;
}

function getMetricValue(product, metric, column) {
  const val = sheetData[product]?.[metric]?.[column];
  return val !== undefined ? val : 0;
}

function buildDashboard() {
  buildVerdict();
  buildSLA();
  buildPendency();
  buildP95P99();
}

function buildVerdict() {
  const slaImages = getMetricValue('Images', 'SLA Breach %', 'MTD');
  const sla360 = getMetricValue('360', 'SLA Breach %', 'MTD');
  const slaVideo = getMetricValue('Video', 'SLA Breach %', 'MTD');
  
  let status = '🟡 MIXED';
  let msg = 'Some products on track, others need attention';
  
  if (slaImages < 30 && sla360 < 70 && slaVideo < 70) {
    status = '🟢 HEALTHY';
    msg = 'All metrics within acceptable range';
  } else if (slaImages > 40 || sla360 > 80 || slaVideo > 80) {
    status = '🔴 AT RISK';
    msg = 'Some metrics exceed thresholds - attention needed';
  }
  
  document.getElementById('verdict').innerHTML = `
    <div class="verdict">
      <span class="vi"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg></span>
      <div class="vt"><b>Health Status: ${status}.</b> ${msg}</div>
    </div>`;
}

function buildSLA() {
  const html = ['Images', '360', 'Video'].map(product => {
    const val = getMetricValue(product, 'SLA Breach %', 'MTD');
    const color = COLORS[product];
    const icon = ICONS[product];
    
    return `<div class="card">
      <div class="card-top">
        <div class="card-id">
          <span style="display:inline-flex;width:32px;height:32px;border-radius:9px;background:${color.icon};color:${color.brand};align-items:center;justify-content:center;">${icon}</span>
          <div><div class="pname">${product}</div><div class="psub">SLA breach</div></div>
        </div>
        <span class="dot" style="background:${color.dot};"></span>
      </div>
      <div class="metric"><span class="big" style="color:${color.metric};">${Math.round(val)}</span><span class="munit">%</span></div>
    </div>`;
  }).join('');
  
  document.getElementById('slaGrid').innerHTML = html;
}

function buildPendency() {
  const html = ['Images', '360', 'Video'].map(product => {
    const val = getMetricValue(product, 'Pendency', 'MTD');
    const color = COLORS[product];
    const icon = ICONS[product];
    
    return `<div class="card">
      <div class="card-top">
        <div class="card-id">
          <span style="display:inline-flex;width:32px;height:32px;border-radius:9px;background:${color.icon};color:${color.brand};align-items:center;justify-content:center;">${icon}</span>
          <div><div class="pname">${product}</div><div class="psub">Pendency</div></div>
        </div>
        <span class="dot" style="background:${color.dot};"></span>
      </div>
      <div class="metric"><span class="big" style="color:${color.metric};">${Math.round(val)}</span></div>
      <div style="font-size:11px;color:#646B7A;margin-top:3px;">VINs > 6 hrs</div>
    </div>`;
  }).join('');
  
  document.getElementById('pendencyGrid').innerHTML = html;
}

function buildP95P99() {
  const html = ['Images', '360', 'Video'].map(product => {
    const p95 = getMetricValue(product, 'P95', 'MTD');
    const p99 = getMetricValue(product, 'P99', 'MTD');
    const color = COLORS[product];
    const icon = ICONS[product];
    
    return `<div class="card ptcard">
      <div class="card-top">
        <div class="card-id">
          <span style="display:inline-flex;width:32px;height:32px;border-radius:9px;background:${color.icon};color:${color.brand};align-items:center;justify-content:center;">${icon}</span>
          <div class="pname" style="line-height:32px;">${product}</div>
        </div>
      </div>
      <div style="display:flex;gap:16px;margin:10px 0 0;padding-top:10px;border-top:1px solid #ECECF1;">
        <div><div class="ptl">P95</div><div style="font-size:16px;font-weight:700;color:${color.metric};margin-top:3px;">${Math.round(p95)}</div></div>
        <div><div class="ptl">P99</div><div style="font-size:16px;font-weight:700;color:${color.metric};margin-top:3px;">${Math.round(p99)}</div></div>
      </div>
    </div>`;
  }).join('');
  
  document.getElementById('p95Grid').innerHTML = html;
}

function updateDateTime() {
  const now = new Date();
  const options = { year: 'numeric', month: 'short', day: 'numeric' };
  document.getElementById('dateTime').textContent = now.toLocaleDateString('en-US', options);
}

// Load dashboard on page load
document.addEventListener('DOMContentLoaded', loadDashboard);

// Auto-refresh every 5 minutes
setInterval(loadDashboard, 5 * 60 * 1000);
</script>
</body></html>
