<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Delivery Report</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
body{margin:0;background:#F4F5F8;color:#0F172A;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
.wrap{max-width:1240px;width:100%;margin:0 auto;padding:22px 20px 40px;}

/* ---- Header ---- */
.top-rule{height:3px;background:#0F172A;border-radius:2px;margin-bottom:18px;}
.hbar{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px;}
.eyebrow{font-size:12px;font-weight:800;letter-spacing:.14em;color:#2D7FF9;text-transform:uppercase;}
.htitle{font-size:30px;font-weight:900;color:#0F172A;letter-spacing:-.5px;margin-top:4px;}
.hdate{font-size:14px;color:#64748B;font-weight:500;margin-top:3px;}
.hpill{background:#0F172A;color:#fff;font-size:12px;font-weight:800;letter-spacing:.08em;padding:6px 14px;border-radius:20px;text-transform:uppercase;}
.hupd{font-size:12px;color:#94A3B8;font-weight:500;margin-top:6px;text-align:right;}

/* ---- Floating refresh ---- */
.refresh-fab{position:fixed;top:16px;right:20px;z-index:900;background:#6C4BD9;color:#fff;border:none;font-family:inherit;font-size:12px;font-weight:700;padding:8px 14px;border-radius:30px;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 4px 14px rgba(108,75,217,.35);}
.refresh-fab:active{transform:scale(.95);}
.refresh-fab:disabled{opacity:.7;cursor:default;}
.refresh-fab svg{width:14px;height:14px;}

/* ---- Section header ---- */
.sec{display:flex;align-items:center;gap:10px;margin:26px 0 12px;}
.sec-bar{width:5px;height:22px;border-radius:3px;}
.sec-title{font-size:21px;font-weight:800;color:#0F172A;letter-spacing:-.2px;}
.sec-note{font-size:13px;color:#94A3B8;font-weight:500;margin-left:2px;}

/* ---- KPI grid & cards ---- */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
.kpi{background:#fff;border:1px solid #E9EBF0;border-radius:12px;padding:16px 16px 14px;box-shadow:0 1px 2px rgba(16,24,40,.04);}
.kpi-label{font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;}
.kpi-mid{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-top:8px;}
.kpi-num{font-size:38px;font-weight:900;color:#0F172A;line-height:1;letter-spacing:-1px;}
.kpi-unit{font-size:15px;font-weight:700;color:#64748B;margin-left:3px;letter-spacing:0;}
.kpi-vs{font-size:12px;font-weight:700;color:#94A3B8;white-space:nowrap;}
.kpi-sub{font-size:12px;color:#94A3B8;font-weight:500;margin-top:8px;}

/* ---- Top issues ---- */
.iss-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.iss-card{background:#fff;border:1px solid #E9EBF0;border-radius:12px;padding:6px 4px;box-shadow:0 1px 2px rgba(16,24,40,.04);align-self:start;}
.iss-head{display:flex;align-items:center;gap:8px;padding:10px 14px 10px;border-bottom:1px solid #F1F2F6;}
.iss-hname{font-size:17px;font-weight:800;}
.iss-row{display:flex;align-items:center;gap:10px;padding:10px 14px;}
.iss-row+.iss-row{border-top:1px solid #F5F6F9;}
.iss-rank{width:24px;height:24px;flex:none;border-radius:50%;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.iss-name{flex:1;min-width:0;font-size:15px;font-weight:600;color:#1C2230;line-height:1.3;}
.iss-dot{width:9px;height:9px;border-radius:50%;flex:none;}
.iss-val{font-size:18px;font-weight:800;color:#0F172A;min-width:48px;text-align:right;}

@media(max-width:1100px){
  .kpi-grid{grid-template-columns:repeat(3,1fr);}
}
@media(max-width:900px){
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .iss-grid{grid-template-columns:1fr;}
}
@media(max-width:600px){
  .wrap{padding:16px 12px 30px;}
  .htitle{font-size:24px;}
  .sec-title{font-size:18px;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:9px;}
  .kpi{padding:13px 13px 12px;}
  .kpi-num{font-size:30px;}
  .kpi-label{font-size:10.5px;}
  .kpi-vs{font-size:10px;}
  .kpi-sub{font-size:10.5px;}
  .hpill{display:none;}
}

.loading{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;}
.loading-spinner{background:#fff;border-radius:12px;padding:26px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.3);}
.spinner{width:36px;height:36px;border:3px solid #E5E7EB;border-top-color:#6C4BD9;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 13px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style></head>
<body>
<button class="refresh-fab" id="refreshBtn" onclick="hardRefresh()" title="Fetch fresh data">
  <svg id="refreshIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><polyline points="21 3.5 21 8 16.5 8"/></svg>
  <span id="refreshTxt">Refresh</span>
</button>

<div class="wrap">
  <div class="top-rule"></div>
  <div class="hbar">
    <div>
      <div class="eyebrow">Delivery · Daily</div>
      <div class="htitle" id="reportTitle">Delivery Report</div>
      <div class="hdate" id="reportDate">—</div>
    </div>
    <div style="text-align:right;">
      <span class="hpill">Delivery</span>
      <div class="hupd">Updated <span id="lastUpdate">—</span> · <span id="cacheState">cached</span></div>
    </div>
  </div>

  <div id="contentContainer" style="display:none;"></div>

  <div id="loadingContainer" class="loading">
    <div class="loading-spinner"><div class="spinner"></div><p style="margin:0;color:#1C2230;font-weight:700;font-size:14px;">Loading Report</p><p id="loadingStatus" style="margin:7px 0 0;font-size:12px;color:#64748B;">Fetching data…</p></div>
  </div>
</div>

<script>
const CACHE_KEY='delivery_dashboard_data', CACHE_TIME='delivery_dashboard_time', CACHE_HOURS=6;

const THEME={
  Images:{bar:'#6C4BD9', name:'#5B3FC4', rankBg:'#EDE9FB', rankFg:'#6C4BD9'},
  '360' :{bar:'#12936A', name:'#0E7A57', rankBg:'#DCF1E8', rankFg:'#12936A'},
  Video :{bar:'#2D7FF9', name:'#1F6BE0', rankBg:'#DEEBFE', rankFg:'#2D7FF9'}
};
const STATUS={green:'#16895C', amber:'#C07C12', red:'#D23B3A', neutral:'#64748B'};
function slaTone(v){ return v<30?'green':v<=50?'amber':'red'; }
function hrTone(v){ return v<6?'green':v<=12?'amber':'red'; }
function cmpTone(now,prev){ if(!prev) return 'neutral'; if(now<=prev*0.98) return 'green'; if(now>=prev*1.02) return 'red'; return 'amber'; }

let data={};

function parseCSVAdvanced(line){
  const out=[]; let cur='', q=false;
  for(let i=0;i<line.length;i++){const ch=line[i],nx=line[i+1];
    if(ch==='"'){ if(q&&nx==='"'){cur+='"';i++;} else q=!q; }
    else if(ch===','&&!q){ out.push(cur.trim()); cur=''; }
    else cur+=ch;
  }
  out.push(cur.trim());
  return out.map(c=>(c.startsWith('"')&&c.endsWith('"'))?c.slice(1,-1):c);
}
function parseNumber(v){ if(!v)return 0; v=String(v).trim(); if(v===''||v==='-')return 0; v=v.replace(/,/g,'').replace(/%/g,''); const n=parseFloat(v); return isNaN(n)?0:n; }

async function loadDashboard(){
  const c=getCache();
  if(c){ data=c; render(); setState('cached'); }
  else { await fetchData(); setCache(data); render(); setState('updated'); }
  document.getElementById('loadingContainer').style.display='none';
  document.getElementById('contentContainer').style.display='block';
}
function setState(s){ document.getElementById('cacheState').textContent=s; }
function getCache(){ const c=localStorage.getItem(CACHE_KEY),t=localStorage.getItem(CACHE_TIME); if(!c||!t)return null; if((Date.now()-parseInt(t))/(36e5)>CACHE_HOURS)return null; return JSON.parse(c); }
function setCache(o){ localStorage.setItem(CACHE_KEY,JSON.stringify(o)); localStorage.setItem(CACHE_TIME,Date.now().toString()); }

async function fetchData(){
  const url='https://docs.google.com/spreadsheets/d/e/2PACX-1vRW-XqDlvrKPrmev5u9X44Pg_qQIu1fzDmCoszOUVAF98yW7esDACb6rUeI6oGybBnZrnFG5477UhzG/pub?gid=2034010422&single=true&output=csv';
  const res=await fetch(url); const csv=await res.text();
  const lines=csv.split('\n').filter(l=>l.trim());
  data={'SLA Breach%':{},'SLA QC%':{},'Pendency':{},'P95 Delivery Time(Hrs)':{},'P99 Delivery Time(Hrs)':{},issues:{}};
  const header=parseCSVAdvanced(lines[0]); const EXPECTED=header.length;
  const colNames=['Target','MTD','ENT','MID','SMB','D-1','D-2','D-3','D-4','D-5','M-1','M-2'];
  let product='';
  for(let i=1;i<lines.length;i++){
    const raw=parseCSVAdvanced(lines[i]);
    if(!raw[1]&&!raw[0]) continue;
    if(raw[0]) product=raw[0].trim();
    const metric=raw[1]?raw[1].trim():''; if(!product||!metric) continue;
    let cells=[...raw]; const extra=cells.length-EXPECTED;
    if(extra>0){
      let vals=cells.slice(2), merged=0;
      for(let k=0;k<vals.length-1&&merged<extra;k++){
        const a=(vals[k]||'').trim(), b=(vals[k+1]||'').trim();
        if(/^\d{1,3}$/.test(a)&&/^\d{3}$/.test(b)){ vals.splice(k,2,a+b); merged++; k--; }
      }
      cells=[cells[0],cells[1],...vals];
    }
    const v={}; for(let j=0;j<colNames.length;j++) v[colNames[j]]=parseNumber(cells[2+j]);
    const ml=metric.toLowerCase();
    if(metric.includes('QC')) data['SLA QC%'][product]=v;
    else if(metric.includes('SLA')) data['SLA Breach%'][product]=v;
    else if(metric.includes('Pendency')) data['Pendency'][product]=v;
    else if(metric.includes('P95')) data['P95 Delivery Time(Hrs)'][product]=v;
    else if(metric.includes('P99')) data['P99 Delivery Time(Hrs)'][product]=v;
    else if(ml.includes('top 5 issue')||ml.includes('top issue')) {}
    else { (data.issues[product]=data.issues[product]||[]).push({name:metric,vals:v}); }
  }
}

function v(metric,p,c){ return data[metric]?.[p]?.[c]??0; }
function fmt(n){ if(n>=1000)return (n/1000).toFixed(1).replace(/\.0$/,'')+'k'; return Math.round(n); }

function render(){ buildTitle(); buildProducts(); buildIssues(); }

function buildTitle(){
  const now=new Date();
  document.getElementById('reportTitle').textContent='Delivery Report';
  document.getElementById('reportDate').textContent=now.toLocaleDateString('en-US',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('lastUpdate').textContent=now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

/* one KPI card */
function kpi(label,labelColor,num,unit,vsText,sub){
  return '<div class="kpi">'
    +'<div class="kpi-label" style="color:'+labelColor+';">'+label+'</div>'
    +'<div class="kpi-mid"><div class="kpi-num">'+num+(unit?'<span class="kpi-unit">'+unit+'</span>':'')+'</div>'
    +(vsText?'<div class="kpi-vs">'+vsText+'</div>':'')+'</div>'
    +(sub?'<div class="kpi-sub">'+sub+'</div>':'')
    +'</div>';
}

function buildProducts(){
  let html='';
  ['Images','360','Video'].forEach(p=>{
    const t=THEME[p];
    const sla=v('SLA Breach%',p,'MTD'), slaM1=v('SLA Breach%',p,'M-1');
    const se=v('SLA Breach%',p,'ENT'), sm=v('SLA Breach%',p,'MID'), ss=v('SLA Breach%',p,'SMB');
    const slaqc=v('SLA QC%',p,'MTD'), slaqcM1=v('SLA QC%',p,'M-1');
    const qe=v('SLA QC%',p,'ENT'), qm=v('SLA QC%',p,'MID'), qs=v('SLA QC%',p,'SMB');
    const pend=v('Pendency',p,'MTD'), pendM1=v('Pendency',p,'M-1');
    const p95=v('P95 Delivery Time(Hrs)',p,'MTD'), p95e=v('P95 Delivery Time(Hrs)',p,'ENT'), p95m=v('P95 Delivery Time(Hrs)',p,'MID'), p95s=v('P95 Delivery Time(Hrs)',p,'SMB');
    const p99=v('P99 Delivery Time(Hrs)',p,'MTD'), p99e=v('P99 Delivery Time(Hrs)',p,'ENT'), p99m=v('P99 Delivery Time(Hrs)',p,'MID'), p99s=v('P99 Delivery Time(Hrs)',p,'SMB');

    const cards=[
      kpi('SLA Breach', STATUS[slaTone(sla)], Math.round(sla), '%',
          'vs '+Math.round(slaM1)+'% last mo',
          'ENT '+Math.round(se)+'% · MID '+Math.round(sm)+'% · SMB '+Math.round(ss)+'%'),
      kpi('SLA Breach QC', STATUS[slaTone(slaqc)], Math.round(slaqc), '%',
          'vs '+Math.round(slaqcM1)+'% last mo',
          'ENT '+Math.round(qe)+'% · MID '+Math.round(qm)+'% · SMB '+Math.round(qs)+'%'),
      kpi('Pendency', STATUS[cmpTone(pend,pendM1)], fmt(pend), '',
          'vs '+fmt(pendM1)+' last mo',
          'open items &gt; 6 hrs'),
      kpi('P95 Delivery', STATUS[hrTone(p95)], fmt(p95), ' hrs', '',
          'ENT '+fmt(p95e)+' · MID '+fmt(p95m)+' · SMB '+fmt(p95s)+' hrs'),
      kpi('P99 Delivery', STATUS[hrTone(p99)], fmt(p99), ' hrs', '',
          'ENT '+fmt(p99e)+' · MID '+fmt(p99m)+' · SMB '+fmt(p99s)+' hrs')
    ].join('');

    html+='<div class="sec"><span class="sec-bar" style="background:'+t.bar+';"></span><span class="sec-title" style="color:'+t.name+';">'+p+'</span><span class="sec-note">MTD · segment split</span></div>'
        +'<div class="kpi-grid">'+cards+'</div>';
  });
  document.getElementById('contentContainer').innerHTML=html+'<div id="issuesMount"></div>';
}

function buildIssues(){
  function issueTone(d1,d2){ if(d1<d2) return 'green'; if(d1>d2) return 'red'; return 'amber'; }
  let cols='';
  ['Images','360','Video'].forEach(p=>{
    const t=THEME[p];
    const issues=(data.issues[p]||[]).map(x=>({name:x.name,mtd:x.vals.MTD,d1:x.vals['D-1'],d2:x.vals['D-2']}))
      .filter(x=>x.mtd>0||x.d1>0||x.d2>0)
      .sort((a,b)=>b.mtd-a.mtd).slice(0,5);
    if(!issues.length){ cols+=''; return; }
    const rows=issues.map((iss,i)=>{
      const dot=STATUS[issueTone(iss.d1,iss.d2)];
      return '<div class="iss-row"><span class="iss-rank" style="background:'+t.rankBg+';color:'+t.rankFg+';">'+(i+1)+'</span>'
        +'<span class="iss-dot" style="background:'+dot+';"></span>'
        +'<span class="iss-name">'+iss.name+'</span><span class="iss-val">'+fmt(iss.mtd)+'</span></div>';
    }).join('');
    cols+='<div class="iss-card"><div class="iss-head"><span class="sec-bar" style="background:'+t.bar+';height:16px;"></span><span class="iss-hname" style="color:'+t.name+';">'+p+'</span></div>'+rows+'</div>';
  });
  const mount=document.getElementById('issuesMount');
  if(mount) mount.innerHTML='<div class="sec"><span class="sec-bar" style="background:#0F172A;"></span><span class="sec-title">Top Issues</span><span class="sec-note">MTD volume · dot = last-day trend</span></div><div class="iss-grid">'+cols+'</div>';
}

async function hardRefresh(){
  const btn=document.getElementById('refreshBtn'),icon=document.getElementById('refreshIcon'),txt=document.getElementById('refreshTxt');
  btn.disabled=true; icon.style.animation='spin .7s linear infinite'; txt.textContent='Refreshing…';
  document.getElementById('loadingContainer').style.display='flex';
  document.getElementById('contentContainer').style.display='none';
  document.getElementById('loadingStatus').textContent='Fetching fresh data from sheet…';
  localStorage.removeItem(CACHE_KEY); localStorage.removeItem(CACHE_TIME);
  try{ await fetchData(); setCache(data); render(); setState('updated'); }
  catch(e){ const c=getCache(); if(c){data=c;render();} setState('error'); }
  document.getElementById('loadingContainer').style.display='none';
  document.getElementById('contentContainer').style.display='block';
  btn.disabled=false; icon.style.animation=''; txt.textContent='Refresh';
}

document.addEventListener('DOMContentLoaded', loadDashboard);
</script>
</body></html>
